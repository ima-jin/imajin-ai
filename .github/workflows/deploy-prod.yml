name: Deploy to Prod

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/jin/prod/imajin-ai
    env:
      PATH: /home/jin/.nvm/versions/node/v22.22.0/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Pull latest tag
        run: |
          git fetch origin --tags
          git reset --hard ${{ github.ref_name }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build changed apps
        # build-changed.sh walks the pnpm graph and only rebuilds apps affected
        # by the diff since the last successful build (tracked via .last-build-sha).
        # Falls back to full rebuild if .last-build-sha doesn't exist.
        run: ./scripts/build-changed.sh

      - name: Run migrations
        run: node scripts/migrate.mjs

      - name: Restart prod services
        run: |
          # Restart all pm2 processes whose name starts with prod-
          # (covers prod-jin/kernel, prod-events, prod-dykil, prod-coffee, prod-market, prod-learn, prod-links, etc.)
          PROD_PROCS=$(pm2 jlist | node -e "const procs = JSON.parse(require('fs').readFileSync(0)); console.log(procs.filter(p => p.name && p.name.startsWith('prod-')).map(p => p.name).join(' '));")
          if [ -z "$PROD_PROCS" ]; then
            echo "⚠️  No prod-* pm2 processes found to restart"
            exit 0
          fi
          echo "Restarting: $PROD_PROCS"
          pm2 restart $PROD_PROCS
          echo "✅ Prod services restarted"
