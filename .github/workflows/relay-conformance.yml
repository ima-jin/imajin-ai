name: DFOS Relay Conformance

on:
  workflow_dispatch:
    inputs:
      relay_url:
        description: 'Relay URL to test against'
        required: false
        default: 'https://dev-registry.imajin.ai/relay'
        type: string
  schedule:
    # Weekly safety net (Mondays 08:00 UTC) against the default dev relay.
    # Manual `workflow_dispatch` remains the primary way we run these from live.
    - cron: '0 8 * * 1'

jobs:
  conformance:
    name: DFOS Conformance Suite
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clone DFOS repo
        run: git clone --depth 1 https://github.com/metalabel/dfos.git

      - name: Run conformance tests
        # Conformance suite moved to its own Go module: packages/relay-conformance
        # (was packages/dfos-web-relay/conformance — that path is now empty and
        # silently passed zero tests).
        working-directory: dfos/packages/relay-conformance
        env:
          RELAY_URL: ${{ github.event.inputs.relay_url || 'https://dev-registry.imajin.ai/relay' }}
        run: |
          echo "🔍 Testing relay at: $RELAY_URL"
          go test -v -count=1 ./... 2>&1 | tee results.txt

          # Summary
          echo ""
          echo "=== SUMMARY ==="
          PASS=$(grep -c "^--- PASS:" results.txt || true)
          FAIL=$(grep -c "^--- FAIL:" results.txt || true)
          TOTAL=$((PASS + FAIL))
          echo "✅ Passed: $PASS"
          echo "❌ Failed: $FAIL"
          echo "📊 Total: $TOTAL"

          # Fail if zero tests ran — an empty/moved suite must NOT report green.
          # (This is the silent-green guard: no tests == broken CI, not success.)
          if [ "$TOTAL" -eq 0 ]; then
            echo ""
            echo "=== ERROR: no conformance tests ran (0 total) ==="
            echo "The suite path may have moved again, or 'go test' failed to build."
            echo "Check dfos/packages/relay-conformance and the go.mod there."
            exit 1
          fi

          # Fail the job if any tests failed.
          if [ "$FAIL" -gt 0 ]; then
            echo ""
            echo "=== FAILING TESTS ==="
            grep "^--- FAIL:" results.txt
            exit 1
          fi
